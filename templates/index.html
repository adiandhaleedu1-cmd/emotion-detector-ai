<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Emotion Detector AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>😊 Emotion Detector AI</h1>

        <p class="tagline">
            AI Powered Facial Emotion Recognition
        </p>

        <div class="main-content">

            <!-- LEFT SIDE -->
            <div class="camera-section">

                <video id="video" autoplay playsinline></video>

                <canvas id="canvas"></canvas>

                <div class="buttons">

                    <button onclick="startCamera()">
                        Open Camera
                    </button>

                    <button onclick="capturePhoto()">
                        Capture
                    </button>

                    <button onclick="analyzeEmotion()">
                        Analyze Emotion
                    </button>

                </div>

                <img id="preview">

            </div>

            <!-- RIGHT SIDE -->
            <div class="result-section">

                <h2>Detected Emotion</h2>

                <div id="resultCard">
                    <div id="result">
                        🙂
                    </div>
                </div>

            </div>

        </div>

        <p class="footer">
            Made with ❤️ using AI & Deep Learning
        </p>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}">
    </script>

</body>

</html>
